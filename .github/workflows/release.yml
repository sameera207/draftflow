name: Release

# Trigger manually from the Actions tab.
# Choose the bump type — patch (0.1.x), minor (0.x.0), or major (x.0.0).
on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

# Needs write access to push the version commit + tag and create the release.
permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14   # Apple Silicon runner — builds arm64 natively

    steps:
      - uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN so the push in a later step
          # can trigger other workflows if needed.
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Import Developer ID certificate into a temporary keychain so codesign
      # can find it during the electron-builder step.
      - name: Import certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "" build.keychain
          rm certificate.p12

      # Bump version in package.json + package-lock.json only (no git commit yet).
      - name: Bump version
        run: npm version ${{ github.event.inputs.bump }} --no-git-tag-version

      # Expose the new version string to later steps.
      - name: Read new version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      # Build the arm64 DMG. --publish never so electron-builder doesn't try
      # to upload anything itself — we handle that below.
      # Notarization env vars are read by electron-builder's notarize hook.
      - name: Build DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --arm64 --publish never

      # electron-builder outputs Draftflow-{version}-arm64.dmg and latest-mac.yml.
      # Rename both to drop the arch suffix so filenames match the Homebrew cask
      # URL and so electron-updater can resolve the download URL from latest-mac.yml.
      # Then staple the notarization ticket directly onto the DMG so Gatekeeper
      # can verify it offline (the .app inside is already stapled by electron-builder).
      - name: Rename and staple artifacts
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          mv "dist/Draftflow-${VERSION}-arm64.dmg" "dist/Draftflow-${VERSION}.dmg"
          sed -i '' "s/Draftflow-${VERSION}-arm64\.dmg/Draftflow-${VERSION}.dmg/g" \
            "dist/latest-mac.yml"
          xcrun stapler staple "dist/Draftflow-${VERSION}.dmg"

      # Commit the version bump, tag it, push both to main.
      - name: Commit and tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: release v${{ steps.ver.outputs.version }}"
          git tag "v${{ steps.ver.outputs.version }}"
          git push origin main --follow-tags

      # Create the GitHub release, attach the DMG, auto-generate release notes
      # from commits / PRs since the previous tag.
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            dist/Draftflow-${{ steps.ver.outputs.version }}.dmg
            dist/latest-mac.yml

      # Update the Homebrew tap cask with the new version + SHA256.
      # Requires a classic PAT with repo scope on sameera207/homebrew-draftflow
      # stored (without trailing newline) as the HOMEBREW_TAP_TOKEN secret:
      #   printf 'ghp_TOKEN' | gh secret set HOMEBREW_TAP_TOKEN --repo sameera207/draftflow --body -
      - name: Update Homebrew cask
        continue-on-error: true
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION:   ${{ steps.ver.outputs.version }}
        run: |
          if [ -z "$TAP_TOKEN" ] || [ "${#TAP_TOKEN}" -lt 10 ]; then
            echo "HOMEBREW_TAP_TOKEN not set or invalid — skipping cask update"
            exit 0
          fi

          DMG="dist/Draftflow-${VERSION}.dmg"
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')
          URL="https://github.com/sameera207/draftflow/releases/download/v${VERSION}/Draftflow-${VERSION}.dmg"
          API="https://api.github.com/repos/sameera207/homebrew-draftflow/contents/Casks/draftflow.rb"
          AUTH="Authorization: Bearer ${TAP_TOKEN}"

          FILE_SHA=$(curl -s -H "$AUTH" -H "Accept: application/vnd.github+json" "$API" | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])")

          # postflight strips com.apple.quarantine so Gatekeeper doesn't reject
          # the ad-hoc-signed bundle as "damaged" on first launch from Finder.
          CONTENT=$(printf 'cask "draftflow" do\n  version "%s"\n  sha256 "%s"\n\n  url "%s"\n  name "Draftflow"\n  desc "Markdown editor for Claude Code workflows"\n  homepage "https://draftflow.dev"\n\n  app "Draftflow.app"\n\n  postflight do\n    system_command "/usr/bin/xattr", args: ["-cr", "#{appdir}/Draftflow.app"]\n  end\n\n  zap trash: [\n    "~/.claude/editor-bridge",\n    "~/Library/Application Support/Draftflow",\n  ]\nend\n' "$VERSION" "$SHA" "$URL")
          ENCODED=$(echo "$CONTENT" | base64 | tr -d '\n')

          RESULT=$(curl -s -o /dev/null -w "%{http_code}" -X PUT "$API" \
            -H "$AUTH" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -d "{\"message\":\"chore: update draftflow to v${VERSION}\",\"content\":\"${ENCODED}\",\"sha\":\"${FILE_SHA}\"}")

          echo "Cask update HTTP $RESULT"
          [ "$RESULT" = "200" ] || [ "$RESULT" = "201" ] || { echo "Cask update failed — check HOMEBREW_TAP_TOKEN"; exit 1; }
