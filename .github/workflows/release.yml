name: Release

# Trigger manually from the Actions tab.
# Choose the bump type — patch (0.1.x), minor (0.x.0), or major (x.0.0).
on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

# Needs write access to push the version commit + tag and create the release.
permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14   # Apple Silicon runner — builds arm64 natively

    steps:
      - uses: actions/checkout@v4
        with:
          # Use the default GITHUB_TOKEN so the push in a later step
          # can trigger other workflows if needed.
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Bump version in package.json + package-lock.json only (no git commit yet).
      - name: Bump version
        run: npm version ${{ github.event.inputs.bump }} --no-git-tag-version

      # Expose the new version string to later steps.
      - name: Read new version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      # Build the arm64 DMG. --publish never so electron-builder doesn't try
      # to upload anything itself — we handle that below.
      - name: Build DMG
        run: npx electron-builder --mac --arm64 --publish never

      # electron-builder outputs Draftflow-{version}-arm64.dmg.
      # Rename to drop the arch suffix so the filename matches the Homebrew
      # cask URL and the in-app update checker.
      - name: Rename DMG
        run: |
          mv "dist/Draftflow-${{ steps.ver.outputs.version }}-arm64.dmg" \
             "dist/Draftflow-${{ steps.ver.outputs.version }}.dmg"

      # Commit the version bump, tag it, push both to main.
      - name: Commit and tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: release v${{ steps.ver.outputs.version }}"
          git tag "v${{ steps.ver.outputs.version }}"
          git push origin main --follow-tags

      # Create the GitHub release, attach the DMG, auto-generate release notes
      # from commits / PRs since the previous tag.
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: dist/Draftflow-${{ steps.ver.outputs.version }}.dmg

      # Update the Homebrew tap cask with the new version + SHA256.
      # Uses the GitHub Contents API (no git push) so a fine-grained PAT with
      # Contents:write on sameera207/homebrew-draftflow is sufficient.
      # Store the PAT as the HOMEBREW_TAP_TOKEN repository secret.
      - name: Update Homebrew cask
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION:   ${{ steps.ver.outputs.version }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set — skipping cask update"
            exit 0
          fi

          DMG="dist/Draftflow-${VERSION}.dmg"
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')
          URL="https://github.com/sameera207/draftflow/releases/download/v${VERSION}/Draftflow-${VERSION}.dmg"
          API="https://api.github.com/repos/sameera207/homebrew-draftflow/contents/Casks/draftflow.rb"
          AUTH="Authorization: Bearer ${TAP_TOKEN}"

          # Get current file blob SHA
          API_RESP=$(curl -s -H "$AUTH" -H "Accept: application/vnd.github+json" "$API")
          echo "API GET response: $API_RESP" | head -c 300
          FILE_SHA=$(echo "$API_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])")
          echo "File SHA: $FILE_SHA"

          # Build and encode cask content
          CONTENT=$(printf 'cask "draftflow" do\n  version "%s"\n  sha256 "%s"\n\n  url "%s"\n  name "Draftflow"\n  desc "Markdown editor for Claude Code workflows"\n  homepage "https://draftflow.dev"\n\n  app "Draftflow.app"\n\n  zap trash: [\n    "~/.claude/editor-bridge",\n    "~/Library/Application Support/Draftflow",\n  ]\nend\n' "$VERSION" "$SHA" "$URL")
          ENCODED=$(echo "$CONTENT" | base64 | tr -d '\n')

          # Push via REST API
          RESULT=$(curl -s -o /dev/null -w "%{http_code}" -X PUT "$API" \
            -H "$AUTH" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -d "{\"message\":\"chore: update draftflow to v${VERSION}\",\"content\":\"${ENCODED}\",\"sha\":\"${FILE_SHA}\"}")

          echo "API response: $RESULT"
          [ "$RESULT" = "200" ] || [ "$RESULT" = "201" ] || { echo "Cask update failed (HTTP $RESULT)"; exit 1; }
